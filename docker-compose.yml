services:
  mariadb:
    image: mariadb:10.6
    container_name: steve-db
    restart: unless-stopped
    networks:
      - steve-net
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: stevedb
      MYSQL_USER: steve
      MYSQL_PASSWORD: changeme
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql

  steve:
    image: steve-local
    container_name: steve-app
    restart: "no"
    networks:
      - steve-net
    depends_on:
      - mariadb
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/stevedb?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: steve
      SPRING_DATASOURCE_PASSWORD: changeme
      SERVER_PORT: 8180
    ports:
      - "8180:8180"

networks:
  steve-net:
    driver: bridge

volumes:
  db_data:
